name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Publish release artifacts
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install GitVersion
        shell: pwsh
        run: |
          dotnet tool install --global GitVersion.Tool --version 6.*

      - name: Build and package module
        shell: pwsh
        run: ./build.ps1 -ResolveDependency -Tasks pack -Verbose

      - name: Sign in to Azure with OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true

      - name: Publish to PowerShell Gallery
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          if (-not $env:PSGALLERY_API_KEY) {
            throw 'PSGallery API key is required.'
          }
          ./build.ps1 -ResolveDependency -Tasks publish

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: output/**/*.nupkg
          generate_release_notes: true
